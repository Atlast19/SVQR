spring.application.name=SistemaValidacionQR

# ==========================
# SQL SERVER
# ==========================

spring.datasource.url=jdbc:sqlserver://localhost:52237;databaseName=SVCQR;encrypt=true;trustServerCertificate=true

spring.datasource.username=spring_user
spring.datasource.password=SpringBoot123!

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =====================================
# JPA
# =====================================

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# =====================================
# JWT
# =====================================

jwt.secret=MiClaveSuperSecretaParaSistemaValidacionQR2026
jwt.expiration=86400000

server.servlet.context-path=/api

logging.level.org.springframework.security=DEBUG


spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl